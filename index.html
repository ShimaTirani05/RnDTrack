<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R&D Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#F1F4EC;
  --surface:#FFFFFF;
  --surface-2:#F7F9F3;
  --ink:#16261C;
  --muted:#657064;
  --forest:#1F4A34;
  --forest-2:#2E6B48;
  --leaf:#5FA83C;
  --soil:#7A5C3E;
  --amber:#D9922B;
  --danger:#C6553B;
  --line:#DCE3D3;
  --line-strong:#C4CFB7;
  --shadow:0 1px 2px rgba(22,38,28,.06),0 8px 24px rgba(22,38,28,.05);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"Inter",system-ui,sans-serif;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:"Bricolage Grotesque",sans-serif;font-weight:600;margin:0;letter-spacing:-.01em}
.mono{font-family:"Space Mono",monospace}
button{font-family:inherit;cursor:pointer}
a{color:var(--forest-2)}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex-shrink:0;background:var(--forest);color:#EAF1E4;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand .logo{display:flex;align-items:center;gap:10px}
.brand .mark{width:30px;height:30px;border-radius:8px;background:var(--leaf);display:grid;place-items:center;flex-shrink:0}
.brand .mark svg{width:18px;height:18px}
.brand h1{font-size:17px;color:#fff;line-height:1.1}
.brand p{margin:2px 0 0;font-size:11px;color:#A9C4A0;letter-spacing:.02em}

.nav{padding:10px 12px;flex:1}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#89A67F;padding:12px 8px 6px}
.staff-btn{
  width:100%;text-align:left;background:none;border:none;color:#D6E4CF;
  padding:9px 10px;border-radius:10px;display:flex;align-items:center;gap:11px;margin-bottom:2px;
  transition:background .12s;
}
.staff-btn:hover{background:rgba(255,255,255,.07)}
.staff-btn.active{background:rgba(255,255,255,.14);color:#fff}
.staff-btn .avatar{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:600;font-size:13px;flex-shrink:0;color:#EAF1E4}
.staff-btn.active .avatar{background:var(--leaf);color:#12331F}
.staff-btn .who{min-width:0}
.staff-btn .who b{font-weight:600;font-size:13.5px;display:block;line-height:1.2}
.staff-btn .who span{font-size:11px;color:#9EBB94;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.staff-btn.active .who span{color:#C3D9BB}

.side-foot{padding:12px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#9EBB94}
.side-foot .sync{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--leaf);flex-shrink:0}
.dot.local{background:var(--amber)}
.side-foot button{background:rgba(255,255,255,.08);color:#D6E4CF;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 9px;font-size:11px;width:100%;margin-top:6px}
.side-foot button:hover{background:rgba(255,255,255,.15)}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:22px 30px 0;max-width:1120px;width:100%;margin:0 auto}
.crumb{font-size:12px;color:var(--muted);letter-spacing:.02em;margin-bottom:4px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-head h2{font-size:27px;line-height:1.05}
.page-head .role{color:var(--muted);font-size:13px;margin-top:3px}
.updated{font-size:12px;color:var(--muted);text-align:right;white-space:nowrap}
.updated b{color:var(--forest-2)}

.reminder{
  margin:16px auto 0;max-width:1120px;width:100%;
  background:linear-gradient(90deg,#FBEFD6,#FDF6E8);border:1px solid #EAD3A2;
  border-radius:12px;padding:11px 16px;display:none;align-items:center;gap:12px;font-size:13px;color:#8A5A12;
}
.reminder.show{display:flex}
.reminder svg{flex-shrink:0}
.reminder.overdue{background:linear-gradient(90deg,#FBE0D8,#FDEDE7);border-color:#E7B3A4;color:#9A3B22}

.subtabs{max-width:1120px;width:100%;margin:20px auto 0;padding:0 30px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line)}
.subtab{
  background:none;border:none;padding:10px 14px 12px;font-size:13.5px;font-weight:500;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;border-radius:6px 6px 0 0;
}
.subtab:hover{color:var(--ink);background:var(--surface-2)}
.subtab.active{color:var(--forest);border-bottom-color:var(--forest);font-weight:600}

.content{max-width:1120px;width:100%;margin:0 auto;padding:22px 30px 60px;flex:1}
.module-intro{color:var(--muted);font-size:13px;margin:0 0 18px;max-width:70ch}

/* ---------- Cards & grids ---------- */
.grid{display:grid;gap:16px}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-head h3{font-size:16px}
.card-head .tag{font-size:11px;font-weight:600;color:var(--forest-2);background:var(--surface-2);border:1px solid var(--line);padding:3px 9px;border-radius:20px}
.card-body{padding:16px 18px}

.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin:0 0 12px}

/* fields */
.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
input,select,textarea{
  width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--surface-2);
  border:1px solid var(--line-strong);border-radius:9px;padding:8px 11px;transition:border .12s,background .12s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--forest-2);background:#fff;box-shadow:0 0 0 3px rgba(46,107,72,.1)}
input[type=number]{font-family:"Space Mono",monospace}
textarea{resize:vertical;min-height:60px}
.link-input{display:flex;gap:8px;align-items:center}
.link-input input{flex:1}
.link-open{flex-shrink:0;width:38px;height:37px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface-2);display:grid;place-items:center;color:var(--forest-2)}
.link-open:hover{background:var(--forest);color:#fff;border-color:var(--forest)}
.link-open.disabled{opacity:.4;pointer-events:none}

/* KPI meter — the signature element */
.kpi{margin-top:4px}
.kpi-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.kpi-top .val{font-family:"Space Mono",monospace;font-weight:700;font-size:22px;line-height:1}
.kpi-top .pct{font-family:"Space Mono",monospace;font-weight:700;font-size:15px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.bar{height:9px;border-radius:6px;background:var(--line);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:6px;background:var(--leaf);transition:width .4s ease}
.bar.warn > i{background:var(--amber)}
.bar.bad > i{background:var(--danger)}
.bar.good > i{background:var(--leaf)}
.kpi-sub{font-size:11.5px;color:var(--muted);margin-top:6px}
.kpi-sub b{color:var(--ink);font-family:"Space Mono",monospace}

/* stat pills */
.stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.stat{flex:1;min-width:120px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.stat .n{font-family:"Space Mono",monospace;font-weight:700;font-size:20px;line-height:1.1}
.stat .l{font-size:11px;color:var(--muted);margin-top:3px}

/* tables */
.tbl-wrap{overflow-x:auto}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line-strong);white-space:nowrap}
table.data td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
table.data tr:last-child td{border-bottom:none}
table.data input,table.data textarea{background:transparent;border:1px solid transparent;padding:6px 8px}
table.data input:hover,table.data textarea:hover{border-color:var(--line-strong);background:var(--surface-2)}
table.data td.num{font-family:"Space Mono",monospace}
.row-del{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);color:var(--danger);display:grid;place-items:center}
.row-del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}

.btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--forest-2);color:var(--forest)}
.btn.primary{background:var(--forest);color:#fff;border-color:var(--forest)}
.btn.primary:hover{background:var(--forest-2);color:#fff}
.btn.ghost{background:none;border-style:dashed}
.add-row{margin-top:12px}

.saved-flash{position:fixed;right:20px;bottom:20px;background:var(--forest);color:#fff;padding:9px 15px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;z-index:50}
.saved-flash.show{opacity:1;transform:translateY(0)}

.empty{color:var(--muted);font-size:13px;padding:8px 0}

/* mobile */
.menu-toggle{display:none}
.scrim{display:none}
@media (max-width:880px){
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);transition:transform .22s;box-shadow:0 0 40px rgba(0,0,0,.3)}
  .sidebar.open{transform:translateX(0)}
  .scrim.show{display:block;position:fixed;inset:0;background:rgba(22,38,28,.4);z-index:35}
  .menu-toggle{display:inline-grid;place-items:center;width:40px;height:40px;border-radius:10px;border:1px solid var(--line-strong);background:var(--surface);position:sticky;top:12px;margin:12px 0 0 16px;z-index:10}
  .topbar{padding:8px 18px 0}
  .subtabs{padding:0 18px}
  .content{padding:20px 18px 60px}
  .page-head h2{font-size:23px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21c0-5 0-8 3-11M12 21C9 16 5 15 4 8c5 0 8 3 8 7M12 10c0-4 3-6 8-6-1 5-4 6-8 6" stroke="#12331F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div><h1>R&amp;D Tracker</h1><p>PROGRESS TIM RISET</p></div>
      </div>
    </div>
    <nav class="nav" id="staffNav"></nav>
    <div class="side-foot">
      <div class="sync"><span class="dot" id="syncDot"></span><span id="syncText">Menyiapkan…</span></div>
      <button id="exportBtn">Backup data (JSON)</button>
      <button id="importBtn">Pulihkan dari backup</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main">
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="#16261C" stroke-width="1.8" stroke-linecap="round"/></svg></button>
    <div class="topbar">
      <div class="crumb" id="crumb">—</div>
      <div class="page-head">
        <div>
          <h2 id="staffName">—</h2>
          <div class="role" id="staffRole">—</div>
        </div>
        <div class="updated" id="updatedInfo"></div>
      </div>
    </div>
    <div class="reminder" id="reminder"></div>
    <div class="subtabs" id="subtabs"></div>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="saved-flash" id="flash">Tersimpan</div>

/* ============================================================
   3. STATE + PENYIMPANAN
   ============================================================ */
const LS_KEY = "rnd_tracker_state_v1";
let STATE = { data:{}, meta:{ updated:{} } }; // data[staff][module] ; meta.updated[staff]=timestamp
let store = null;          // adapter aktif
let saveTimer = null;
let current = { staff:"shima", module:"melon" };
let suppressWrite = false; // saat menerima update dari remote

// bangun struktur default kalau belum ada
function ensureDefaults(){
  for(const [sk,staff] of Object.entries(SCHEMA)){
    STATE.data[sk] = STATE.data[sk] || {};
    for(const mod of staff.modules){
      if(!STATE.data[sk][mod.key]){
        STATE.data[sk][mod.key] = deepClone(mod.data);
      }
    }
  }
}
const deepClone = o => JSON.parse(JSON.stringify(o));

function getPath(obj,path){
  return path.split(".").reduce((a,k)=> (a==null?undefined:a[k]), obj);
}
function setPath(obj,path,val){
  const ks = path.split("."); const last = ks.pop();
  let t = obj; for(const k of ks){ if(t[k]==null) t[k]= /^\d+$/.test(ks[ks.indexOf(k)+1]||last)?[]:{}; t=t[k]; }
  t[last]=val;
}

/* ---- Adapter: Firebase (real-time) atau Lokal ---- */
async function initStore(){
  if(FIREBASE_CONFIG.apiKey){
    try{
      const [{ initializeApp }, fs] = await Promise.all([
        import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
        import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"),
      ]);
      const app = initializeApp(FIREBASE_CONFIG);
      const db = fs.getFirestore(app);
      const ref = fs.doc(db,"rnd","state");
      store = {
        mode:"cloud",
        async load(){
          const snap = await fs.getDoc(ref);
          if(snap.exists()) return snap.data();
          return null;
        },
        async save(state){ await fs.setDoc(ref, deepClone(state)); },
        watch(cb){
          fs.onSnapshot(ref, snap=>{ if(snap.exists()) cb(snap.data()); });
        }
      };
      return;
    }catch(e){ console.warn("Firebase gagal, memakai penyimpanan lokal:",e); }
  }
  // fallback lokal (localStorage -> memory)
  let mem=null;
  const canLS = (()=>{ try{ localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(_){return false;} })();
  store = {
    mode: canLS ? "local" : "memory",
    async load(){
      if(canLS){ const raw=localStorage.getItem(LS_KEY); return raw?JSON.parse(raw):null; }
      return mem;
    },
    async save(state){
      if(canLS){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(_){ mem=deepClone(state);} }
      else mem=deepClone(state);
    },
    watch(){}
  };
}

function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    if(suppressWrite) return;
    try{ await store.save(STATE); flash("Tersimpan"); }
    catch(e){ flash("Gagal menyimpan"); console.error(e); }
  }, 500);
}

function touch(staff){
  STATE.meta.updated[staff] = Date.now();
  renderUpdatedInfo(); renderReminder(); renderNav();
}

const flashEl = document.getElementById("flash");
let flashT=null;
function flash(msg){ flashEl.textContent=msg; flashEl.classList.add("show"); clearTimeout(flashT); flashT=setTimeout(()=>flashEl.classList.remove("show"),1400); }

function pct(num,den){ den=+den||0; num=+num||0; return den>0? Math.round(num/den*100):0; }
function barClass(p){ return p>=90?"good":p>=60?"warn":"bad"; }
function fmtNum(n){ n=+n||0; return n.toLocaleString("id-ID"); }
function daysSince(ts){ if(!ts) return null; return Math.floor((Date.now()-ts)/86400000); }
function hst(dateStr){
  if(!dateStr) return "—";
  const d=new Date(dateStr); if(isNaN(d)) return "—";
  const days=Math.floor((Date.now()-d.getTime())/86400000);
  if(days<0) return "belum tanam";
  return `${days} HST (~${Math.floor(days/7)} mgg)`;
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function safeUrl(u){ u=(u||"").trim(); if(!u) return ""; return /^https?:\/\//i.test(u)?u:"https://"+u; }

// input kecil
function inputHTML(path,type,value,ph=""){
  const v=esc(value);
  if(type==="textarea") return `<textarea data-path="${path}" placeholder="${ph}" rows="1">${v}</textarea>`;
  const t = type==="number"?"number":type==="date"?"date":"text";
  const extra = type==="number"?'min="0"':"";
  return `<input data-path="${path}" type="${t}" ${extra} value="${v}" placeholder="${ph}" />`;
}
function linkFieldHTML(path,label,value){
  const u=safeUrl(value); const dis=u?"":"disabled";
  return `<div class="field"><label>${esc(label)}</label>
    <div class="link-input">
      <input data-path="${path}" type="url" value="${esc(value)}" placeholder="Tempel link Google Drive…" />
      <a class="link-open ${dis}" data-linkopen href="${u||"#"}" target="_blank" rel="noopener" title="Buka">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 15L20 4M20 4h-6M20 4v6M14 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div></div>`;
}
function kpiHTML(numPath,denPath,label,unit){
  const num=+getPath(STATE.data,numPath)||0, den=+getPath(STATE.data,denPath)||0, p=pct(num,den);
  return `<div class="kpi" data-kpi data-num="${numPath}" data-den="${denPath}">
    <div class="kpi-top"><span class="val">${fmtNum(num)}<span style="font-size:12px;font-weight:400;color:var(--muted)"> ${esc(unit||"")}</span></span><span class="pct">${p}%</span></div>
    <div class="bar ${barClass(p)}"><i style="width:${Math.min(p,100)}%"></i></div>
    <div class="kpi-sub">Target KPI: <b>${fmtNum(den)}</b> ${esc(unit||"")} • <span class="kpi-label">Pemenuhan ${p}%</span></div>
  </div>`;
}

/* ============================================================
   6. RECOMPUTE (update tampilan turunan tanpa re-render input)
   ============================================================ */
function recompute(scope=document){
  scope.querySelectorAll("[data-kpi]").forEach(el=>{
    const num=+getPath(STATE.data,el.dataset.num)||0, den=+getPath(STATE.data,el.dataset.den)||0, p=pct(num,den);
    const bar = el.matches(".bar")?el:el.querySelector(".bar");
    if(bar){ bar.className="bar "+barClass(p); const i=bar.querySelector("i"); if(i) i.style.width=Math.min(p,100)+"%"; }
    const val=el.querySelector(".val"); if(val){ const unit=val.querySelector("span")?.outerHTML||""; val.innerHTML=fmtNum(num)+unit; }
    const pc=el.querySelector(".pct"); if(pc) pc.textContent=p+"%";
    const sub=el.querySelector(".kpi-sub b"); if(sub) sub.textContent=fmtNum(den);
    const subLbl=el.querySelector(".kpi-label"); if(subLbl) subLbl.textContent="Pemenuhan "+p+"%";
  });
  scope.querySelectorAll("[data-pct]").forEach(el=>{
    const [n,dp]=el.dataset.pct.split("|");
    el.textContent=pct(getPath(STATE.data,n),getPath(STATE.data,dp))+"%";
  });
  scope.querySelectorAll("[data-val]").forEach(el=>{ el.textContent=fmtNum(getPath(STATE.data,el.dataset.val)); });
  scope.querySelectorAll("[data-hst]").forEach(el=>{ el.textContent=hst(getPath(STATE.data,el.dataset.hst)); });
  scope.querySelectorAll("[data-sum]").forEach(el=>{
    const [arrPath,field]=el.dataset.sum.split(":");
    const arr=getPath(STATE.data,arrPath)||[];
    const tot=arr.reduce((a,it)=>a+(+it[field]||0),0);
    if(el.classList.contains("tag")) el.textContent="Total: "+fmtNum(tot)+" "+(el.textContent.split(" ").pop());
    else el.textContent=fmtNum(tot);
  });
}
function refreshLinkButtons(scope=document){
  scope.querySelectorAll("[data-linkopen]").forEach(a=>{
    const inp=a.parentElement.querySelector("input"); const u=safeUrl(inp?.value);
    a.href=u||"#"; a.classList.toggle("disabled",!u);
  });
}

  }else if(dl>=REMINDER_DAYS){
    el.className="reminder show overdue";
    el.innerHTML=iconBell()+`<span>Sudah <b>${dl} hari</b> sejak update terakhir. Waktunya update mingguan, ${esc(name)}!</span>`;
  }else if(dl>=REMINDER_DAYS-2){
    el.className="reminder show";
    el.innerHTML=iconBell()+`<span>Update mingguan mendekati tenggat (${REMINDER_DAYS-dl} hari lagi). Jangan lupa perbarui data, ${esc(name)}.</span>`;
  }else{
    el.className="reminder";
  }
}
function iconBell(){return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

/* ---- render halaman aktif ---- */
function render(){
  renderNav(); renderSubtabs(); renderHeader(); renderReminder();
  const s=SCHEMA[current.staff]; const m=s.modules.find(x=>x.key===current.module)||s.modules[0];
  current.module=m.key;
  contentEl.innerHTML=renderModule(current.staff,m);
  refreshLinkButtons(contentEl);
  contentEl.querySelectorAll("textarea").forEach(t=>{ t.style.height="auto"; t.style.height=Math.max(t.scrollHeight,38)+"px"; });
  window.scrollTo({top:0});
}

/* ============================================================
   8. EVENT BINDING
   ============================================================ */
// input di konten -> update state
contentEl.addEventListener("input",e=>{
  const t=e.target;
  if(t.dataset.path){
    let v=t.value;
    if(t.type==="number") v=v===""?0:+v;
    setPath(STATE.data,t.dataset.path,v);
    recompute(t.closest(".card")||contentEl);
    if(t.closest(".link-input")) refreshLinkButtons(t.closest(".link-input"));
    touch(current.staff);
    persist();
    // auto-grow textarea
    if(t.tagName==="TEXTAREA"){ t.style.height="auto"; t.style.height=t.scrollHeight+"px"; }
  }
});
// tombol tambah / hapus baris
contentEl.addEventListener("click",e=>{
  const add=e.target.closest("[data-add]");
  if(add){
    const base=add.dataset.add; const [sk,mk]=base.split(".");
    const mod=SCHEMA[sk].modules.find(x=>x.key===mk);
    const blank={}; mod.columns.forEach(c=> blank[c.key]= c.type==="number"?0:"");
    STATE.data[sk][mk].items.push(blank);
    touch(sk); persist(); render(); return;
  }
  const del=e.target.closest("[data-del]");
  if(del){
    const parts=del.dataset.del.split("."); const idx=+parts.pop(); parts.pop(); // remove 'items'
    const [sk,mk]=parts;
    STATE.data[sk][mk].items.splice(idx,1);
    touch(sk); persist(); render(); return;
  }
});
// prevent link buttons with '#'
contentEl.addEventListener("click",e=>{
  const a=e.target.closest("[data-linkopen]");
  if(a && (a.getAttribute("href")==="#"||a.classList.contains("disabled"))){ e.preventDefault(); }
});

// navigasi staff & modul
navEl.addEventListener("click",e=>{
  const b=e.target.closest("[data-staff]"); if(!b) return;
  current.staff=b.dataset.staff; current.module=SCHEMA[current.staff].modules[0].key;
  closeSidebar(); render();
});
subtabsEl.addEventListener("click",e=>{
  const b=e.target.closest("[data-module]"); if(!b) return;
  current.module=b.dataset.module; render();
});

// sidebar mobile
const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
function closeSidebar(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("menuToggle").addEventListener("click",()=>{ sidebar.classList.add("open"); scrim.classList.add("show"); });
scrim.addEventListener("click",closeSidebar);

// sync status
function renderSyncStatus(){
  const dot=document.getElementById("syncDot"), txt=document.getElementById("syncText");
  if(store.mode==="cloud"){ dot.className="dot"; txt.textContent="Tersinkron antar-device"; }
  else if(store.mode==="local"){ dot.className="dot local"; txt.textContent="Tersimpan di perangkat ini"; }
  else { dot.className="dot local"; txt.textContent="Mode sementara (tanpa simpan)"; }
}

// export / import
document.getElementById("exportBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`rnd-tracker-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
});
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const obj=JSON.parse(r.result); if(obj.data){ STATE=obj; ensureDefaults(); persist(); render(); renderSyncStatus(); flash("Backup dipulihkan"); } }catch(_){ flash("File tidak valid"); } };
  r.readAsText(f);
});

/* ============================================================
   9. BOOT
   ============================================================ */
async function boot(){
  await initStore();
  const loaded = await store.load();
  if(loaded && loaded.data){ STATE=loaded; if(!STATE.meta) STATE.meta={updated:{}}; if(!STATE.meta.updated) STATE.meta.updated={}; }
  ensureDefaults();
  renderSyncStatus();
  render();
  // simpan struktur awal bila kosong
  if(!loaded) persist();
  // dengarkan perubahan dari device lain (cloud)
  let firstSnap=true;
  store.watch(remote=>{
    if(!remote||!remote.data) return;
    if(firstSnap){ firstSnap=false; return; } // abaikan snapshot awal
    suppressWrite=true;
    STATE=remote; if(!STATE.meta) STATE.meta={updated:{}};
    ensureDefaults();
    render();
    setTimeout(()=>suppressWrite=false,100);
    flash("Data diperbarui dari device lain");
  });
}
boot();
</script>
